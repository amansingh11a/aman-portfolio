services:
  - type: web
    name: aman-portfolio
    runtime: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DB_TYPE
        value: sqlite
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_EXPIRY_HOURS
        value: "24"
